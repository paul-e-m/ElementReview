<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel Replay Client</title>
    <link rel="stylesheet" href="panel-styles.css?v=20260424-12" />
</head>
<body>
    <div class="panelShell" id="panelShell">
        <div class="panelLayout" id="panelTopRow">
            <aside id="elementRail" class="elementRail hidden" aria-label="Elements"></aside>

            <div id="videoPane" class="videoPane">
                <div id="panelSessionInfo" class="panelSessionInfo hidden">
                    <span id="panelSessionInfoText" class="panelSessionInfoText"></span>
                    <button id="panelSessionRefreshBtn" class="panelSessionRefreshBtn" type="button" title="Refresh" aria-label="Refresh">
                        <img class="panelSessionRefreshIcon" src="/img/buttons/refresh.png" alt="" draggable="false" />
                    </button>
                </div>
                <video id="v" class="panelVideo" playsinline muted preload="metadata"></video>
                <div id="emptyState" class="emptyState hidden">
                    <div class="emptyStateCard">
                        <div id="emptyStateMessage" class="emptyStateMessage">There are no video clips currently available</div>
                        <button id="emptyStateRefreshBtn" class="emptyStateRefreshBtn" type="button">Refresh</button>
                    </div>
                </div>
            </div>
            <div id="timelineArea" class="timelineArea" aria-label="Video timeline">
                <div id="timeline" class="timeline">
                    <div id="stopwatchRange" class="stopwatchRange hidden"></div>
                    <div id="elementMarkers" class="elementMarkers"></div>
                    <div class="timelineClip">
                        <div id="timelineTicks" class="timelineTicks"></div>
                    </div>
                    <div id="stopwatchMarker" class="stopwatchMarker hidden"></div>
                    <div id="playhead" class="playhead"></div>
                </div>
                <div id="stopwatchIndicator" class="stopwatchIndicator hidden">00:00:00</div>
                <div id="outOfClipIndicator" class="outOfClipIndicator hidden">-00:00:00</div>
                <div id="timelineLabels" class="timelineLabels"></div>
            </div>

            <div id="transportRow" class="transportRow">
                <button id="stopwatchBtn" class="transportBtn stopwatchBtn stopwatchTextBtn" type="button" disabled title="Timer On" aria-label="Timer On" aria-pressed="false">
                    <span id="stopwatchBtnLabel" class="stopwatchBtnLabel">TIMER ON</span>
                </button>

                <div class="transportButtons" aria-label="Playback controls">
                    <button id="rew10" class="transportBtn jumpBtn" type="button" disabled title="Back 10 seconds" aria-label="Back 10 seconds">
                        <span class="transportBtnLabel">-10s</span>
                    </button>
                    <button id="rew3" class="transportBtn jumpBtn" type="button" disabled title="Back 3 seconds" aria-label="Back 3 seconds">
                        <span class="transportBtnLabel">-3s</span>
                    </button>

                    <button id="playPause" class="transportBtn iconBtn playPauseBtn isPlay" type="button" disabled title="Play" aria-label="Play">
                        <span class="playPauseGlyph" aria-hidden="true"></span>
                    </button>

                    <button id="fwd3" class="transportBtn jumpBtn" type="button" disabled title="Forward 3 seconds" aria-label="Forward 3 seconds">
                        <span class="transportBtnLabel">+3s</span>
                    </button>
                    <button id="fwd10" class="transportBtn jumpBtn" type="button" disabled title="Forward 10 seconds" aria-label="Forward 10 seconds">
                        <span class="transportBtnLabel">+10s</span>
                    </button>
                </div>

                <div id="relativeIndicator" class="relativeIndicator">0:00:00</div>
            </div>
        </div>
    </div>

    <script src="panel.js?v=20260424-15"></script>
</body>
</html>
