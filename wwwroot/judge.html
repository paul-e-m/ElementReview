<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Replay Client</title>
    <style>
        body {
            margin: 0;
            padding: 12px;
            font-family: system-ui, Segoe UI, Arial, sans-serif;
            background: #0b0f17;
        }

        .wrap {
            width: min(1100px, 100%);
            margin: 0 auto;
        }

        video {
            width: 100%;
            display: block;
            background: #000;
            border-radius: 12px 12px 0 0;
        }

        .controls {
            margin-top: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timelineArea {
            position: relative;
            height: 32px;
            cursor: pointer;
            user-select: none;
        }

        .timeline {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 17px;
            background: #1f6f73;
            border: 1px solid rgba(170, 245, 240, 0.35);
            border-top: 0;
            overflow: visible;
        }

        .timelineClip {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .timelineTicks {
            position: absolute;
            inset: 0;
        }

        .tick {
            position: absolute;
            bottom: 0;
            width: 1px;
            transform: translateX(-0.5px);
        }

            .tick.big {
                height: 100%;
                background: rgba(230, 255, 252, 0.65);
            }

            .tick.small {
                height: 50%;
                background: rgba(230, 255, 252, 0.38);
            }

        .timelineLabels {
            position: absolute;
            left: 0;
            right: 0;
            top: 18px;
            height: 14px;
            pointer-events: none;
        }

        .tickLabel {
            position: absolute;
            top: 0;
            transform: translateX(-50%);
            font-size: 11px;
            line-height: 1;
            color: #d7e9e8;
            white-space: nowrap;
        }

        .playhead {
            position: absolute;
            top: -3px;
            height: 23px;
            width: 10px;
            background: #ffffff;
            z-index: 4;
            pointer-events: none;
            border-radius: 2px;
        }

        .jumpRow {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            width: 65%;
            margin: 0 auto;
        }

        button {
            height: 44px;
            border-radius: 10px;
            font-weight: 900;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            cursor: pointer;
            color: #eef6ff;
        }

        #restart {
            border: 1px solid rgba(255, 214, 10, 0.55);
            background: rgba(255, 214, 10, 0.22);
            color: #fff8d6;
        }

        #playPause {
            border: 1px solid rgba(34, 197, 94, 0.60);
            background: rgba(34, 197, 94, 0.24);
            color: #eafff1;
        }

        #rew10,
        #rew3,
        #fwd3,
        #fwd10 {
            border: 1px solid rgba(59, 130, 246, 0.55);
            background: rgba(59, 130, 246, 0.20);
            color: #e7f0ff;
        }

        #restart:hover {
            border-color: rgba(255, 214, 10, 0.80);
        }

        #playPause:hover {
            border-color: rgba(34, 197, 94, 0.85);
        }

        #rew10:hover,
        #rew3:hover,
        #fwd3:hover,
        #fwd10:hover {
            border-color: rgba(59, 130, 246, 0.82);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!--
      Lightweight remote replay client for judges.
      Unlike index.html, this page does not manage the full session lifecycle;
      it waits for replay mode, loads the smaller `kind=remote` asset, and
      exposes a focused transport UI for a single requested clip.
    -->
    <div class="wrap">
        <!-- Single remote video player backed by the shared copied/remote asset. -->
        <video id="v" playsinline preload="auto"></video>

        <div class="controls">
            <!-- Clip-local timeline: labels are relative to the selected clip, not the full recording. -->
            <div id="timelineArea" class="timelineArea" aria-label="Video timeline">
                <div id="timeline" class="timeline">
                    <div class="timelineClip">
                        <div id="timelineTicks" class="timelineTicks"></div>
                    </div>
                    <div id="playhead" class="playhead"></div>
                </div>
                <div id="timelineLabels" class="timelineLabels"></div>
            </div>

            <!-- Compact transport row optimized for remote judging/review use. -->
            <div class="jumpRow">
                <button id="restart" type="button" disabled>Restart</button>
                <button id="rew10" type="button" disabled>&lt;&lt; 10s</button>
                <button id="rew3" type="button" disabled>&lt;&lt; 3s</button>
                <button id="playPause" type="button" disabled>Play</button>
                <button id="fwd3" type="button" disabled>&gt;&gt; 3s</button>
                <button id="fwd10" type="button" disabled>&gt;&gt; 10s</button>
            </div>
        </div>
    </div>

    <script>
        // This page assumes it is served from the same origin as the main app,
        // so API and video URLs can be addressed relative to the current host.
        const BASE = "";
        const END_EPS = 0.02;

        // ----------------------------
        // DOM references
        // ----------------------------
        const dom = {
            video: document.getElementById("v"),
            timelineArea: document.getElementById("timelineArea"),
            timeline: document.getElementById("timeline"),
            timelineTicks: document.getElementById("timelineTicks"),
            timelineLabels: document.getElementById("timelineLabels"),
            playhead: document.getElementById("playhead"),

            restart: document.getElementById("restart"),
            playPause: document.getElementById("playPause"),
            rew10: document.getElementById("rew10"),
            rew3: document.getElementById("rew3"),
            fwd3: document.getElementById("fwd3"),
            fwd10: document.getElementById("fwd10")
        };

        // ----------------------------
        // App state
        // ----------------------------
        const state = {
            // Clip currently being reviewed.
            clip: null,        // { index, startSeconds, endSeconds }
            // URL options that control startup behavior.
            wantAutoplay: false,
            wantLoop: false,
            // Manual loop flag for this whole clip; unlike index.html there is
            // no custom in/out loop editor in the remote client.
            loopArmed: false,
            // Used to ignore stale async seek completions when multiple jumps
            // happen back-to-back.
            seekToken: 0,
            seekInFlight: false
        };

        // ----------------------------
        // Small async utilities
        // ----------------------------
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function waitForEvent(target, eventName, timeoutMs = 5000) {
            return new Promise(resolve => {
                let finished = false;

                function done() {
                    if (finished) return;
                    finished = true;
                    clearTimeout(timer);
                    target.removeEventListener(eventName, done);
                    resolve();
                }

                const timer = setTimeout(done, timeoutMs);
                target.addEventListener(eventName, done, { once: true });
            });
        }

        function bufferedEnough(timeSeconds, minAheadSeconds = 0.35) {
            const ranges = dom.video.buffered;
            for (let i = 0; i < ranges.length; i++) {
                if (
                    ranges.start(i) <= timeSeconds + 0.02 &&
                    ranges.end(i) >= timeSeconds + minAheadSeconds
                ) {
                    return true;
                }
            }
            return false;
        }

        // ----------------------------
        // Read options from URL. The short `?2` form is convenient when pages
        // are launched directly from another app or scoreboard workflow.
        // Supports:
        //   ?2&autoplay=1&loop=1
        //   ?clip=2&autoplay=1&loop=1
        //   short aliases: c, a/ap, l/lp
        // ----------------------------
        function readOptions() {
            const search = location.search || "";
            const params = new URLSearchParams(search);

            function isTrue(value) {
                if (value == null) return false;
                const s = String(value).trim().toLowerCase();
                return s === "1" || s === "true" || s === "yes" || s === "y" || s === "on";
            }

            let clipIndex = null;

            const shortForm = search.match(/^\?(\d+)(?:&|$)/);
            if (shortForm) {
                clipIndex = parseInt(shortForm[1], 10);
            }

            if (clipIndex == null) {
                const raw = params.get("clip") ?? params.get("c");
                if (raw && /^\d+$/.test(raw)) {
                    clipIndex = parseInt(raw, 10);
                }
            }

            return {
                clipIndex,
                autoplay: isTrue(params.get("autoplay") ?? params.get("ap") ?? params.get("a")),
                loop: isTrue(params.get("loop") ?? params.get("lp") ?? params.get("l"))
            };
        }

        // ----------------------------
        // Poll /api/status until the main host has finished recording and
        // switched into replay mode with the requested clip available.
        // The remote client intentionally does not guess clip timing locally.
        // ----------------------------
        async function getReplayClip(clipIndex) {
            const startedAt = Date.now();

            while (Date.now() - startedAt < 30000) {
                try {
                    const response = await fetch(BASE + "/api/status", { cache: "no-store" });
                    if (!response.ok) {
                        throw new Error(`${response.status} ${await response.text()}`);
                    }

                    const status = await response.json();
                    const mode = String(status.mode ?? status.Mode ?? "").toLowerCase();
                    const isRecording = !!(status.isRecording ?? status.IsRecording);

                    if (mode === "replay" && !isRecording) {
                        const rawClips = Array.isArray(status.clips ?? status.Clips)
                            ? (status.clips ?? status.Clips)
                            : [];

                        const clips = rawClips
                            .map(c => ({
                                index: Number(c.index ?? c.Index),
                                startSeconds: Number(c.startSeconds ?? c.StartSeconds),
                                endSeconds: Number(c.endSeconds ?? c.EndSeconds)
                            }))
                            .filter(c =>
                                Number.isFinite(c.index) &&
                                Number.isFinite(c.startSeconds) &&
                                Number.isFinite(c.endSeconds) &&
                                c.endSeconds > c.startSeconds
                            )
                            .sort((a, b) => a.index - b.index);

                        const clip = clips.find(c => c.index === clipIndex);
                        if (clip) {
                            return clip;
                        }
                    }
                } catch {
                    // Ignore transient polling errors and keep trying.
                }

                await sleep(500);
            }

            throw new Error("Timed out waiting for replay/clip.");
        }

        // ----------------------------
        // Keep transport labels and the playhead in sync with the actual video.
        // All timeline math here is clip-relative even though the video itself
        // is the full shared recording.
        // ----------------------------
        function syncVideoUI() {
            const clip = state.clip;

            dom.playPause.textContent = dom.video.paused ? "Play" : "Pause";

            if (!clip) {
                dom.playhead.style.left = "0%";
                return;
            }

            const duration = Math.max(0, clip.endSeconds - clip.startSeconds);
            if (duration <= 0.001) {
                dom.playhead.style.left = "0%";
                return;
            }

            const relativeTime = Math.max(
                0,
                Math.min(duration, (dom.video.currentTime || 0) - clip.startSeconds)
            );

            const percent = (relativeTime / duration) * 100;
            dom.playhead.style.left = percent + "%";
        }

        // ----------------------------
        // Rebuild the simple clip-local timeline for the requested segment.
        // This is cheap enough to redraw on resize without involving canvas.
        // ----------------------------
        function drawTimeline() {
            dom.timelineTicks.innerHTML = "";
            dom.timelineLabels.innerHTML = "";

            const clip = state.clip;
            if (!clip) return;

            const duration = Math.max(0, clip.endSeconds - clip.startSeconds);
            if (duration <= 0.001) return;

            for (let t = 0; t <= duration + 0.001; t += 0.5) {
                const isBigTick = Math.abs(t - Math.round(t)) < 0.001;
                const percent = (t / duration) * 100;

                const tick = document.createElement("div");
                tick.className = "tick " + (isBigTick ? "big" : "small");
                tick.style.left = percent + "%";
                dom.timelineTicks.appendChild(tick);

                if (isBigTick) {
                    const label = document.createElement("div");
                    label.className = "tickLabel";
                    label.style.left = percent + "%";
                    label.textContent = String(Math.round(t));
                    dom.timelineLabels.appendChild(label);
                }
            }

            syncVideoUI();
        }

        // ----------------------------
        // Start playback, but do not crash if the browser blocks autoplay or
        // refuses a play() promise for policy reasons.
        // ----------------------------
        function startPlayback() {
            const playPromise = dom.video.play();
            dom.playPause.textContent = "Pause";

            if (playPromise && typeof playPromise.catch === "function") {
                playPromise.catch(() => {
                    syncVideoUI();
                });
            }
        }

        // ----------------------------
        // Seek to an absolute time in the full source recording.
        // Important behavior:
        // - clamp to the current clip boundaries
        // - pause during the seek so interframe playback is more stable
        // - wait for `seeked` plus a small amount of buffer before resuming
        // - ignore stale completions if a newer seek started meanwhile
        // ----------------------------
        async function goToTime(targetTime, keepPlaying = !dom.video.paused) {
            const clip = state.clip;
            if (!clip) return;

            const upperBound = Math.max(clip.startSeconds, clip.endSeconds - END_EPS);
            const clamped = Math.max(clip.startSeconds, Math.min(upperBound, targetTime));
            const token = ++state.seekToken;
            // Tiny deltas do not need a real seek; this avoids unnecessary
            // churn on browsers that already landed near the target frame.
            const needSeek = Math.abs((dom.video.currentTime || 0) - clamped) > 0.01;

            state.seekInFlight = true;
            dom.video.pause();
            dom.playPause.textContent = "Play";

            if (needSeek) {
                dom.video.currentTime = clamped;
                await waitForEvent(dom.video, "seeked", 1200);
                if (token !== state.seekToken) return;
            }

            if (keepPlaying) {
                // Give the browser a moment to buffer ahead before resuming.
                // This reduces choppiness on the smaller interframe remote file.
                const bufferWaitStarted = Date.now();
                while (!bufferedEnough(clamped, 0.35) && Date.now() - bufferWaitStarted < 800) {
                    await sleep(50);
                    if (token !== state.seekToken) return;
                }

                if (state.loopArmed && (dom.video.currentTime || 0) >= clip.endSeconds - END_EPS) {
                    dom.video.currentTime = clip.startSeconds;
                }

                startPlayback();
            } else {
                dom.playPause.textContent = "Play";
            }

            if (token === state.seekToken) {
                state.seekInFlight = false;
            }
            syncVideoUI();
        }

        // ----------------------------
        // Play/pause transport preserves the original judge-page behavior:
        // a manual pause also clears loop mode.
        // ----------------------------
        function togglePlayPause() {
            const clip = state.clip;
            if (!clip) return;

            if (dom.video.paused) {
                if ((dom.video.currentTime || 0) >= clip.endSeconds - END_EPS) {
                    void goToTime(clip.startSeconds, true);
                    return;
                }
                dom.video.playbackRate = 1.0;
                startPlayback();
            } else {
                dom.video.pause();
                dom.playPause.textContent = "Play";
                state.loopArmed = false;
            }

            syncVideoUI();
        }

        // ----------------------------
        // Load the remote asset, park the playhead on the requested clip start,
        // wait for initial buffering, then enable the transport controls.
        // ----------------------------
        async function prepareVideo() {
            const clip = state.clip;
            if (!clip) return;

            // Muting before autoplay improves the chance that browsers will
            // allow automatic playback on page open.
            if (state.wantAutoplay) {
                dom.video.muted = true;
            }

            if (dom.video.readyState < 1) {
                await waitForEvent(dom.video, "loadedmetadata", 5000);
            }

            dom.video.pause();
            dom.video.playbackRate = 1.0;

            const start = Math.max(clip.startSeconds, Math.min(clip.endSeconds, clip.startSeconds));
            const needSeek = Math.abs((dom.video.currentTime || 0) - start) > 0.01;

            dom.video.currentTime = start;

            if (needSeek) {
                await waitForEvent(dom.video, "seeked", 4000);
            }

            // Wait for a modest amount of forward buffer so the first play is
            // less likely to stutter on LAN clients.
            const bufferWaitStarted = Date.now();
            while (!bufferedEnough(start, 0.75) && Date.now() - bufferWaitStarted < 4000) {
                await sleep(100);
            }

            drawTimeline();

            dom.restart.disabled = false;
            dom.playPause.disabled = false;
            dom.rew10.disabled = false;
            dom.rew3.disabled = false;
            dom.fwd3.disabled = false;
            dom.fwd10.disabled = false;

            state.loopArmed = state.wantLoop;
            dom.playPause.textContent = "Play";

            if (state.wantAutoplay) {
                startPlayback();
            }

            syncVideoUI();
        }

        // ----------------------------
        // Event wiring
        // ----------------------------
        dom.video.addEventListener("timeupdate", () => {
            const clip = state.clip;
            if (!clip) return;
            if (state.seekInFlight) return;

            syncVideoUI();

            const t = Number(dom.video.currentTime || 0);

            // Stop cleanly at the end of the requested clip. Looping reuses
            // the stabilized seek path instead of forcing a raw end seek.
            if (t >= clip.endSeconds - END_EPS) {
                if (state.loopArmed && !dom.video.paused) {
                    void goToTime(clip.startSeconds, true);
                } else {
                    dom.video.pause();
                    dom.playPause.textContent = "Play";
                }

                syncVideoUI();
            }
        });

        dom.video.addEventListener("loadedmetadata", syncVideoUI);
        dom.video.addEventListener("seeked", syncVideoUI);
        window.addEventListener("resize", drawTimeline);

        dom.timelineArea.addEventListener("click", async e => {
            const clip = state.clip;
            if (!clip) return;

            const rect = dom.timelineArea.getBoundingClientRect();
            if (rect.width <= 0) return;

            const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
            const percent = x / rect.width;
            const duration = clip.endSeconds - clip.startSeconds;
            const targetTime = clip.startSeconds + (percent * duration);

            await goToTime(targetTime, !dom.video.paused);
        });

        dom.restart.addEventListener("click", async () => {
            const clip = state.clip;
            if (!clip) return;

            await goToTime(clip.startSeconds, true);
        });

        dom.playPause.addEventListener("click", togglePlayPause);
        dom.rew10.addEventListener("click", async () => await goToTime((dom.video.currentTime || 0) - 10));
        dom.rew3.addEventListener("click", async () => await goToTime((dom.video.currentTime || 0) - 3));
        dom.fwd3.addEventListener("click", async () => await goToTime((dom.video.currentTime || 0) + 3));
        dom.fwd10.addEventListener("click", async () => await goToTime((dom.video.currentTime || 0) + 10));

        // ----------------------------
        // Startup flow:
        // 1. read clip/autoplay/loop options from the URL
        // 2. point the video element at the shared remote asset
        // 3. poll until the requested clip exists in replay mode
        // 4. prepare the transport UI around that clip
        // ----------------------------
        async function init() {
            const options = readOptions();

            if (!options.clipIndex || options.clipIndex <= 0) {
                alert("Missing clip number in URL. Example: ?2&autoplay=1&loop=1");
                return;
            }

            state.wantAutoplay = !!options.autoplay;
            state.wantLoop = !!options.loop;
            state.loopArmed = state.wantLoop;

            // All remote clients share the smaller copied-file variant.
            dom.video.src = BASE + "/api/recording/file?kind=remote";
            dom.video.load();

            state.clip = await getReplayClip(options.clipIndex);
            await prepareVideo();
        }

        init().catch(err => {
            console.error(err);
            alert(err?.message || "Replay client failed.");
        });
    </script>
</body>
</html>
