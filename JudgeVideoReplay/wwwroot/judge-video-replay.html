<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Judge Video Replay</title>
    <link rel="stylesheet" href="judge-video-replay.css?v=20260428-jvrzoom1" />
</head>
<body>
    <div class="judgeVideoReplayShell" id="judgeVideoReplayShell">
        <div class="judgeVideoReplayLayout" id="judgeVideoReplayTopRow">
            <aside id="elementRailColumn" class="elementRailColumn hidden" aria-label="Elements">
                <div id="elementRail" class="elementRail"></div>
            </aside>

            <div id="videoPane" class="videoPane">
                <div id="judgeVideoReplaySessionInfo" class="judgeVideoReplaySessionInfo hidden">
                    <span id="judgeVideoReplaySessionInfoText" class="judgeVideoReplaySessionInfoText"></span>
                    <span id="judgeVideoReplayServerStatus" class="judgeVideoReplayServerStatus" title="Server status" aria-label="Server status">
                        <span id="judgeVideoReplayServerStatusDot" class="replayPingDot idle" aria-hidden="true"></span>
                    </span>
                    <button id="judgeVideoReplaySessionRefreshBtn" class="judgeVideoReplaySessionRefreshBtn" type="button" title="Refresh" aria-label="Refresh">
                        <img class="judgeVideoReplaySessionRefreshIcon" src="/img/buttons/refresh.png" alt="" draggable="false" />
                    </button>
                    <button id="judgeVideoReplaySettingsBtn" class="judgeVideoReplaySessionSettingsBtn" type="button" title="Settings" aria-label="Settings">
                        <img class="judgeVideoReplaySessionSettingsIcon" src="/img/buttons/settings.png?v=20260428-jvrzoom1" alt="" draggable="false" />
                    </button>
                    <button id="judgeVideoReplayLogoBtn" class="judgeVideoReplaySessionLogoBtn" type="button" title="Logo Screen" aria-label="Logo Screen">
                        <img class="judgeVideoReplaySessionLogoIcon" src="/img/logo.png" alt="" draggable="false" />
                    </button>
                </div>
                <video id="v" class="judgeVideoReplayVideo" playsinline muted preload="metadata"></video>
                <div id="emptyState" class="emptyState hidden">
                    <div class="emptyStateCard">
                        <div id="emptyStateMessage" class="emptyStateMessage">There are no video clips currently available</div>
                    </div>
                </div>
            </div>
            <div id="timelineArea" class="timelineArea hidden" aria-label="Video timeline" aria-hidden="true">
                <div id="timeline" class="timeline">
                    <div id="stopwatchRange" class="stopwatchRange hidden"></div>
                    <div id="elementMarkers" class="elementMarkers"></div>
                    <div class="timelineClip">
                        <div id="timelineTicks" class="timelineTicks"></div>
                    </div>
                    <div id="stopwatchMarker" class="stopwatchMarker hidden"></div>
                    <div id="playhead" class="playhead"></div>
                </div>
                <div id="stopwatchIndicator" class="stopwatchIndicator hidden">00:00:00</div>
                <div id="outOfClipIndicator" class="outOfClipIndicator hidden">-00:00:00</div>
                <div id="timelineLabels" class="timelineLabels"></div>
            </div>

            <div id="transportRow" class="transportRow">
                <button id="fullRecordingBtn" class="transportBtn fullRecordingBtn hidden" type="button" disabled title="Full Recording" aria-label="Full Recording" aria-pressed="false">
                    <img class="fullRecordingIcon" src="/img/buttons/video_icon.png?v=20260428-jvrzoom1" alt="" draggable="false" />
                </button>

                <button id="stopwatchBtn" class="transportBtn stopwatchBtn" type="button" disabled title="Timer On" aria-label="Timer On" aria-pressed="false">
                    <img class="stopwatchBtnIcon" src="/img/buttons/stopwatch.png" alt="" draggable="false" />
                </button>

                <div id="timingPresetButtons" class="timingPresetButtons hidden" aria-label="Timing presets">
                    <button class="transportBtn timingPresetBtn" type="button" data-timing-seconds="8" disabled title="Set timer to 8 seconds" aria-label="Set timer to 8 seconds">
                        <span class="transportBtnLabel">8</span>
                    </button>
                    <button class="transportBtn timingPresetBtn" type="button" data-timing-seconds="10" disabled title="Set timer to 10 seconds" aria-label="Set timer to 10 seconds">
                        <span class="transportBtnLabel">10</span>
                    </button>
                    <button class="transportBtn timingPresetBtn" type="button" data-timing-seconds="13" disabled title="Set timer to 13 seconds" aria-label="Set timer to 13 seconds">
                        <span class="transportBtnLabel">13</span>
                    </button>
                </div>

                <div class="transportButtons" aria-label="Playback controls">
                    <button id="rew10" class="transportBtn jumpBtn" type="button" disabled title="Back 10 seconds" aria-label="Back 10 seconds">
                        <span class="transportBtnLabel">-10s</span>
                    </button>
                    <button id="rew3" class="transportBtn jumpBtn" type="button" disabled title="Back 3 seconds" aria-label="Back 3 seconds">
                        <span class="transportBtnLabel">-3s</span>
                    </button>

                    <button id="playPause" class="transportBtn iconBtn playPauseBtn isPlay" type="button" disabled title="Play" aria-label="Play">
                        <span class="playPauseGlyph" aria-hidden="true"></span>
                    </button>

                    <button id="fwd3" class="transportBtn jumpBtn" type="button" disabled title="Forward 3 seconds" aria-label="Forward 3 seconds">
                        <span class="transportBtnLabel">+3s</span>
                    </button>
                    <button id="fwd10" class="transportBtn jumpBtn" type="button" disabled title="Forward 10 seconds" aria-label="Forward 10 seconds">
                        <span class="transportBtnLabel">+10s</span>
                    </button>
                </div>

                <div id="relativeIndicator" class="relativeIndicator">0:00:00</div>
            </div>
        </div>
    </div>

    <div id="brandOverlay" class="brandOverlay hidden" aria-hidden="true">
        <img class="brandOverlayLogo" src="/img/logo.png" alt="Element Review" draggable="false" />
        <div class="brandOverlayMessage">CLICK ANYWHERE TO RETURN TO ELEMENT REVIEW / CLIQUEZ N'IMPORTE OÙ POUR REVENIR À ELEMENT REVIEW</div>
    </div>

    <div id="judgeVideoReplaySettingsOverlay" class="judgeVideoReplaySettingsOverlay hidden" aria-hidden="true">
        <div class="judgeVideoReplaySettingsDialog" role="dialog" aria-modal="true" aria-labelledby="judgeVideoReplaySettingsTitle">
            <div class="judgeVideoReplaySettingsHeader">
                <h2 id="judgeVideoReplaySettingsTitle" data-judge-video-replay-i18n="settings">Judge Video Replay Settings</h2>
                <select id="judgeVideoReplaySettingsLanguage" class="judgeVideoReplaySettingsLanguage" aria-label="Language">
                    <option value="en" data-judge-video-replay-i18n="languageEnglish">English</option>
                    <option value="fr" data-judge-video-replay-i18n="languageFrench">Francais</option>
                </select>
            </div>

            <div class="judgeVideoReplaySettingsBody">
                <section class="judgeVideoReplaySettingsSection">
                    <h3 data-judge-video-replay-i18n="general">General</h3>
                    <label class="judgeVideoReplaySettingsField" for="judgeVideoReplaySettingsUiZoomPercent">
                        <span>
                            <strong data-judge-video-replay-i18n="uiZoom">UI Zoom (%)</strong>
                            <small data-judge-video-replay-i18n="uiZoomHelp">Default zoom level for the Judge Video Replay window. 100 = normal size.</small>
                        </span>
                        <input id="judgeVideoReplaySettingsUiZoomPercent" type="number" min="50" max="150" step="5" />
                    </label>
                </section>

                <section class="judgeVideoReplaySettingsSection">
                    <h3 data-judge-video-replay-i18n="connection">Connection</h3>
                    <label class="judgeVideoReplaySettingsField" for="judgeVideoReplaySettingsServerIp">
                        <span data-judge-video-replay-i18n="serverIp">Server IP address (VRO laptop)</span>
                        <input id="judgeVideoReplaySettingsServerIp" type="text" spellcheck="false" />
                    </label>
                    <label class="judgeVideoReplaySettingsToggle" for="judgeVideoReplaySettingsTimerEnabled">
                        <span>
                            <strong data-judge-video-replay-i18n="timerEnabled">Enable timer controls</strong>
                            <small data-judge-video-replay-i18n="timerEnabledHelp">Open Judge Video Replay with timer controls visible.</small>
                        </span>
                        <input id="judgeVideoReplaySettingsTimerEnabled" type="checkbox" />
                    </label>
                </section>
            </div>

            <div class="judgeVideoReplaySettingsFooter">
                <div id="judgeVideoReplaySettingsStatus" class="judgeVideoReplaySettingsStatus"></div>
                <button id="judgeVideoReplaySettingsSaveBtn" class="judgeVideoReplaySettingsSaveBtn" type="button" data-judge-video-replay-i18n="saveAndClose">Save and Close</button>
            </div>
        </div>
    </div>

    <script src="judge-video-replay-i18n.js?v=20260428-jvrzoom1"></script>
    <script src="judge-video-replay.js?v=20260428-jvrzoom1"></script>
</body>
</html>
